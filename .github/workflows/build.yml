name: Build and Release C Programs

on:
  push:
    branches: [ main ]        # run on pushes to main
  workflow_dispatch:          # allows manual trigger

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Install GCC
      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install build-essential -y

      # Step 3: Compile executables separately
      - name: Compile C Programs
        run: |
          gcc simple_calc.c -o simple_calc -lm
          gcc task_to_do.c -o task_to_do
          ls -la   # optional: list files to verify compilation

      # Step 4: Create a GitHub Release
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Upload the executables
      - name: Upload Executables to Release
        uses: softprops/action-gh-release@v1
        with:
          files: simple_calc task_to_do
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
