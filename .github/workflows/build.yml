name: Build and Release C Programs

# Top-level permissions for the workflow
permissions:
  contents: write   # allows pushing artifacts & creating releases

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allow manual trigger

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install build-essential -y

      - name: Compile C Programs
        run: |
          gcc simple_calc.c -o simple_calc -lm
          gcc task_to_do.c -o task_to_do
          ls -la   # optional: check files

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Executables to Release
        uses: softprops/action-gh-release@v1
        with:
          files: simple_calc task_to_do
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
