name: Build and Release C Programs

permissions:
  contents: write   # needed for checkout, releases, artifacts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install build-essential -y

      - name: Compile C Programs
        run: |
          gcc simple_calc.c -o simple_calc -lm
          gcc task_to_do.c -o task_to_do
          ls -la

      - name: Create Tag
        id: tag
        run: |
          TAG="v$(date +'%Y%m%d%H%M%S')"  # unique timestamp tag
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Executables to Release
        uses: softprops/action-gh-release@v1
        with:
          files: simple_calc task_to_do
          tag_name: ${{ env.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
